<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣股票分析工具</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-main:    #0d1117;
      --bg-card:    #161b22;
      --bg-card2:   #1c2330;
      --border:     #30363d;
      --text-1:     #e6edf3;
      --text-2:     #8b949e;
      --text-3:     #6e7681;
      --blue:       #58a6ff;
      --up:         #f85149;   /* 台灣：紅 = 漲 */
      --down:       #3fb950;   /* 台灣：綠 = 跌 */
      --flat:       #8b949e;
      --gold:       #c9a227;
      --purple:     #8957e5;
    }

    body { font-family: 'Segoe UI','Microsoft JhengHei',Arial,sans-serif; background:var(--bg-main); color:var(--text-1); min-height:100vh; }

    /* ── Header ── */
    header { background:var(--bg-card); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; gap:20px; position:sticky; top:0; z-index:100; }
    .logo { font-size:19px; font-weight:700; color:var(--blue); white-space:nowrap; }
    .search-wrap { display:flex; gap:8px; flex:1; max-width:460px; }
    .search-wrap input { flex:1; background:var(--bg-main); border:1px solid var(--border); border-radius:8px; padding:9px 14px; color:var(--text-1); font-size:14px; outline:none; transition:border-color .2s; }
    .search-wrap input:focus { border-color:var(--blue); }
    .search-wrap input::placeholder { color:var(--text-3); }
    .btn { background:var(--blue); color:#000; border:none; border-radius:8px; padding:9px 20px; font-size:14px; font-weight:700; cursor:pointer; transition:opacity .2s; white-space:nowrap; }
    .btn:hover { opacity:.85; }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Container ── */
    .wrap { max-width:1280px; margin:0 auto; padding:20px 16px 60px; }

    /* ── Loading ── */
    .loading-box { display:flex; flex-direction:column; align-items:center; gap:14px; padding:70px 0; color:var(--text-2); font-size:15px; }
    .spin { width:44px; height:44px; border:4px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-step { font-size:13px; color:var(--text-3); }

    /* ── Error ── */
    .err-box { background:#2d1e1e; border:1px solid #6e3030; border-radius:10px; padding:16px 20px; color:#f97583; font-size:14px; margin-bottom:16px; }

    /* ── Info Bar ── */
    .info-bar { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:18px 24px; margin-bottom:20px; display:flex; align-items:center; gap:28px; flex-wrap:wrap; }
    .stock-name { font-size:21px; font-weight:700; }
    .stock-code { font-size:13px; color:var(--text-2); margin-left:6px; }
    .stock-industry { font-size:12px; color:var(--text-3); margin-left:6px; }
    .price-big { font-size:30px; font-weight:700; }
    .price-chg { font-size:15px; font-weight:600; }
    .price-big.up,.price-chg.up { color:var(--up); }
    .price-big.down,.price-chg.down { color:var(--down); }
    .price-big.flat,.price-chg.flat { color:var(--flat); }
    .meta-row { display:flex; gap:24px; flex-wrap:wrap; }
    .meta-item { display:flex; flex-direction:column; gap:2px; }
    .meta-item .lbl { font-size:11px; color:var(--text-3); }
    .meta-item .val { font-size:14px; font-weight:600; }

    /* ── Section ── */
    .section { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
    .sec-head { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    .sec-head h2 { font-size:15px; font-weight:600; }
    .sec-body { padding:18px 20px; }

    /* ── Table ── */
    .tbl-scroll { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th { background:var(--bg-card2); color:var(--text-2); padding:9px 12px; text-align:right; white-space:nowrap; font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.3px; }
    thead th:first-child { text-align:left; }
    tbody tr { border-top:1px solid var(--border); transition:background .15s; }
    tbody tr:hover { background:rgba(88,166,255,.05); }
    tbody td { padding:8px 12px; text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
    tbody td:first-child { text-align:left; color:var(--text-2); }
    .c-up   { color:var(--up);   font-weight:600; }
    .c-down { color:var(--down); font-weight:600; }
    .c-flat { color:var(--flat); }
    .c-ma   { color:var(--gold); }
    .c-ma60 { color:var(--purple); }

    /* ── Chart ── */
    .chart-wrap { position:relative; height:350px; }
    .chart-sm    { position:relative; height:220px; }

    /* ── Tabs ── */
    .tab-bar { display:flex; gap:2px; padding:14px 20px 0; border-bottom:1px solid var(--border); }
    .tab-btn { background:none; border:none; border-radius:8px 8px 0 0; padding:8px 16px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--text-2); transition:all .2s; white-space:nowrap; }
    .tab-btn.active { background:var(--bg-card2); color:var(--text-1); border:1px solid var(--border); border-bottom:1px solid var(--bg-card2); }
    .tab-btn:not(.active):hover { color:var(--text-1); }
    .tab-pane { display:none; padding:18px 20px; }
    .tab-pane.active { display:block; }

    /* ── Fund Cards ── */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
    .fcard { background:var(--bg-card2); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .fcard-head { padding:11px 16px; background:rgba(88,166,255,.07); border-bottom:1px solid var(--border); font-size:12.5px; font-weight:700; color:var(--blue); }
    .fcard-body { padding:2px 0; }
    .frow { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; border-bottom:1px solid rgba(48,54,61,.6); }
    .frow:last-child { border-bottom:none; }
    .flbl { font-size:12.5px; color:var(--text-2); }
    .fval { font-size:13px; font-weight:600; }
    .fval.up   { color:var(--up); }
    .fval.down { color:var(--down); }

    /* ── Status note ── */
    .status-note { font-size:12px; padding:8px 0 0; }
    .status-note.ok  { color:#3fb950; }
    .status-note.warn{ color:var(--gold); }
    .status-note.err { color:#f97583; }

    /* ── Source ── */
    .source { font-size:11.5px; color:var(--text-3); margin-top:10px; text-align:right; }
    .source a { color:var(--blue); text-decoration:none; }
    .source a:hover { text-decoration:underline; }

    .hidden { display:none !important; }
  </style>
</head>
<body>

<header>
  <div class="logo">📈 台灣股票分析</div>
  <div class="search-wrap">
    <input id="codeInput" type="text" placeholder="輸入股票代碼（如：2330、0050）" maxlength="6"
           onkeydown="if(event.key==='Enter') doSearch()">
    <button class="btn" id="searchBtn" onclick="doSearch()">查詢</button>
  </div>
</header>

<div class="wrap">
  <!-- Loading -->
  <div id="loadingEl" class="loading-box hidden">
    <div class="spin"></div>
    <span>資料載入中，請稍候…</span>
    <span class="loading-step" id="loadStep"></span>
  </div>
  <!-- Error -->
  <div id="errorEl" class="err-box hidden"></div>

  <div id="mainEl" class="hidden">

    <!-- Info Bar -->
    <div class="info-bar" id="infoBar"></div>

    <!-- 股價表 -->
    <div class="section">
      <div class="sec-head"><span>📊</span><h2>股價歷史（近 60 個交易日）</h2></div>
      <div class="sec-body">
        <div class="tbl-scroll">
          <table>
            <thead>
              <tr>
                <th>日期</th><th>開盤</th><th>最高</th><th>最低</th><th>收盤</th>
                <th>漲跌</th><th>漲跌%</th><th>成交量(張)</th>
                <th><span style="color:var(--gold)">MA20</span></th>
                <th><span style="color:var(--purple)">MA60</span></th>
              </tr>
            </thead>
            <tbody id="priceBody"></tbody>
          </table>
        </div>
        <p class="source">資料來源：<a href="https://www.twse.com.tw" target="_blank">TWSE 臺灣證券交易所</a> ／ <a href="https://www.tpex.org.tw" target="_blank">TPEx 櫃買中心</a></p>
      </div>
    </div>

    <!-- 走勢圖 -->
    <div class="section">
      <div class="sec-head"><span>📉</span><h2>股價走勢圖</h2></div>
      <div class="sec-body">
        <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
      </div>
    </div>

    <!-- 財報 -->
    <div class="section">
      <div class="sec-head"><span>🔎</span><h2>財報與基本面分析</h2></div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab(this,'tp-overview')">總覽</button>
        <button class="tab-btn" onclick="switchTab(this,'tp-income')">損益表</button>
        <button class="tab-btn" onclick="switchTab(this,'tp-balance')">資產負債表</button>
        <button class="tab-btn" onclick="switchTab(this,'tp-revenue')">月營收 &amp; 配息</button>
      </div>
      <div id="tp-overview" class="tab-pane active"></div>
      <div id="tp-income"   class="tab-pane"></div>
      <div id="tp-balance"  class="tab-pane"></div>
      <div id="tp-revenue"  class="tab-pane"></div>
      <div style="padding:0 20px 14px">
        <div id="fmStatus" class="status-note"></div>
        <p class="source">財務資料來源：<a href="https://finmindtrade.com" target="_blank">FinMind 台灣金融資料平台</a></p>
      </div>
    </div>

  </div><!-- /mainEl -->
</div>

<script>
/* ═══════════════════ Globals ═══════════════════ */
let priceChartInst = null;
let revChartInst   = null;

/* ═══════════════════ Helpers ═══════════════════ */
const $  = id => document.getElementById(id);
const nn = s  => parseFloat(String(s).replace(/,/g, ''));

function fmt(n, d = 2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtB(n) {
  if (n == null || isNaN(n)) return '—';
  const a = Math.abs(n);
  if (a >= 1e12) return (n / 1e12).toFixed(2) + ' 兆';
  if (a >= 1e8)  return (n / 1e8).toFixed(2)  + ' 億';
  if (a >= 1e4)  return (n / 1e4).toFixed(1)  + ' 萬';
  return n.toLocaleString();
}
function fmtP(n) { return (n == null || isNaN(n)) ? '—' : (n * 100).toFixed(2) + '%'; }

function rocToISO(s) {
  const [y, m, d] = String(s).split('/');
  return `${parseInt(y) + 1911}-${m}-${d}`;
}
function isoDisp(s) { return s.replace(/-/g, '/'); }

function dateToROC(dt) {
  const y = dt.getFullYear() - 1911;
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  return `${y}/${m}`;
}

function dateToQ(s) {
  const m = parseInt(s.slice(5, 7));
  return `${s.slice(0, 4)} Q${Math.ceil(m / 3)}`;
}

/* ═══════════════════ MA ═══════════════════ */
function calcMA(closes, p) {
  return closes.map((_, i) => {
    if (i < p - 1) return null;
    return closes.slice(i - p + 1, i + 1).reduce((a, b) => a + b, 0) / p;
  });
}

/* ═══════════════════ UI helpers ═══════════════════ */
function setStep(msg) { const el = $('loadStep'); if (el) el.textContent = msg; }
function showLoading() { $('loadingEl').classList.remove('hidden'); $('mainEl').classList.add('hidden'); $('errorEl').classList.add('hidden'); }
function showMain()    { $('loadingEl').classList.add('hidden');    $('mainEl').classList.remove('hidden'); }
function showError(m)  { $('loadingEl').classList.add('hidden'); $('errorEl').textContent = m; $('errorEl').classList.remove('hidden'); }

function switchTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $(id).classList.add('active');
}

/* ═══════════════════ TWSE / TPEx Price ═══════════════════ */
async function fetchTWSEMonth(code, year, month) {
  const ds = `${year}${String(month).padStart(2, '0')}01`;
  try {
    const r = await fetch(`https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${ds}&stockNo=${code}`);
    if (!r.ok) return null;
    const j = await r.json();
    return (j.stat === 'OK' && j.data) ? { data: j.data, title: j.title || '' } : null;
  } catch { return null; }
}

async function fetchTPExMonth(code, rocYM) {
  try {
    const url = `https://www.tpex.org.tw/web/stock/aftertrading/daily_trading_info/st43_result.php?l=zh-tw&d=${encodeURIComponent(rocYM)}&stkno=${code}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    return (j.aaData && j.aaData.length) ? { data: j.aaData, title: `${j.stkNo} ${j.stkName}` } : null;
  } catch { return null; }
}

async function fetchAllPrices(code) {
  const today = new Date();
  let allRows = [], stockName = '', isTWO = false;

  // Try TWSE
  for (let i = 0; i < 5; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    await new Promise(r => setTimeout(r, 200));
    const res = await fetchTWSEMonth(code, d.getFullYear(), d.getMonth() + 1);
    if (res) {
      if (!stockName && res.title) { const m = res.title.match(/\d{4,6}\s+(.+?)\s/); if (m) stockName = m[1].trim(); }
      for (const row of res.data) allRows.push({ date: rocToISO(row[0]), open: nn(row[3]), high: nn(row[4]), low: nn(row[5]), close: nn(row[6]), change: nn(row[7]), vol: Math.round(nn(row[1]) / 1000) });
    }
  }

  // Try TPEx if no TWSE data
  if (!allRows.length) {
    isTWO = true;
    for (let i = 0; i < 5; i++) {
      const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
      await new Promise(r => setTimeout(r, 200));
      const res = await fetchTPExMonth(code, dateToROC(d));
      if (res) {
        if (!stockName) { const m = res.title.match(/\d{4,6}\s+(.+)/); stockName = m ? m[1].trim() : res.title; }
        for (const row of res.data) allRows.push({ date: rocToISO(row[0]), open: nn(row[3]), high: nn(row[4]), low: nn(row[5]), close: nn(row[6]), change: nn(row[7]), vol: Math.round(nn(row[1]) / 1000) });
      }
    }
  }

  // Deduplicate & sort
  const seen = new Set();
  allRows = allRows.filter(r => { if (seen.has(r.date)) return false; seen.add(r.date); return true; });
  allRows.sort((a, b) => a.date.localeCompare(b.date));
  return { rows: allRows, stockName, isTWO };
}

/* ═══════════════════ FinMind API ═══════════════════ */
const FM_BASE = 'https://api.finmindtrade.com/api/v4/data';

async function fm(dataset, id, startDate) {
  const url = `${FM_BASE}?dataset=${dataset}&stock_id=${id}&start_date=${startDate}`;
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) return [];
    const j = await r.json();
    return (j.status === 200 && j.data) ? j.data : [];
  } catch (e) { console.log(`FinMind ${dataset} failed:`, e.message); return []; }
}

async function fetchFinMind(code) {
  const y2 = new Date(); y2.setFullYear(y2.getFullYear() - 2);
  const y1 = new Date(); y1.setFullYear(y1.getFullYear() - 1);
  const s2 = y2.toISOString().slice(0, 10);
  const s1 = y1.toISOString().slice(0, 10);

  setStep('FinMind 財報資料載入中…');

  const [info, income, balance, cashflow, dividend, monthly] = await Promise.allSettled([
    fm('TaiwanStockInfo', code, '2010-01-01'),
    fm('TaiwanStockFinancialStatements', code, s2),
    fm('TaiwanStockBalanceSheet', code, s2),
    fm('TaiwanStockCashFlowsStatement', code, s2),
    fm('TaiwanStockDividend', code, s2),
    fm('TaiwanStockMonthRevenue', code, s1),
  ]);

  return {
    info:     info.value     || [],
    income:   income.value   || [],
    balance:  balance.value  || [],
    cashflow: cashflow.value || [],
    dividend: dividend.value || [],
    monthly:  monthly.value  || [],
  };
}

/* Group FinMind data by date: [[date, {key:val,...}], ...] newest-first */
function byPeriod(arr) {
  const map = {};
  for (const r of arr) {
    if (!map[r.date]) map[r.date] = {};
    map[r.date][r.origin_name] = r.value;
  }
  return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
}

/* ═══════════════════ Render Info Bar ═══════════════════ */
function renderInfoBar(code, stockName, rows, fmData) {
  const last = rows[rows.length - 1];
  const prev = rows[rows.length - 2];
  const chg  = last.close - (prev?.close ?? last.close - last.change);
  const pct  = prev ? (chg / prev.close) * 100 : 0;
  const cls  = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';

  // FinMind extras
  const fmInfo    = fmData?.info?.find(i => i.stock_id === code) || {};
  const industry  = fmInfo.industry_category || '';
  const dispName  = stockName || fmInfo.stock_name || code;

  const incPeriods = byPeriod(fmData?.income || []);
  const latestInc  = incPeriods[0]?.[1] || {};
  const eps = latestInc['基本每股盈餘（元）'];
  const pe  = eps && eps > 0 ? last.close / eps : null;

  const recentDiv = (fmData?.dividend || []).sort((a, b) => b.date.localeCompare(a.date))[0];
  const cashDiv   = recentDiv?.cash_dividend;
  const divYield  = cashDiv && last.close > 0 ? cashDiv / last.close : null;

  const hiArr = rows.map(r => r.high);
  const loArr = rows.map(r => r.low);
  const hi = Math.max(...hiArr), lo = Math.min(...loArr);

  $('infoBar').innerHTML = `
    <div style="flex:0 0 auto">
      <span class="stock-name">${dispName}</span>
      <span class="stock-code">${code}</span>
      ${industry ? `<span class="stock-industry">${industry}</span>` : ''}
    </div>
    <div style="flex:0 0 auto">
      <div class="price-big ${cls}">${fmt(last.close)}</div>
      <div class="price-chg ${cls}">${chg >= 0 ? '+' : ''}${fmt(chg)} (${chg >= 0 ? '+' : ''}${fmt(pct)}%)</div>
    </div>
    <div class="meta-row">
      <div class="meta-item"><span class="lbl">P/E 本益比</span><span class="val">${pe ? fmt(pe, 1) + 'x' : '—'}</span></div>
      <div class="meta-item"><span class="lbl">EPS</span><span class="val">${eps != null ? fmt(eps) + '元' : '—'}</span></div>
      <div class="meta-item"><span class="lbl">股息殖利率</span><span class="val">${divYield ? fmtP(divYield) : '—'}</span></div>
      <div class="meta-item"><span class="lbl">近期最高</span><span class="val">${fmt(hi)}</span></div>
      <div class="meta-item"><span class="lbl">近期最低</span><span class="val">${fmt(lo)}</span></div>
      <div class="meta-item"><span class="lbl">成交量(張)</span><span class="val">${fmt(last.vol, 0)}</span></div>
    </div>`;
}

/* ═══════════════════ Render Price Table ═══════════════════ */
function renderPriceTable(rows) {
  const closes = rows.map(r => r.close);
  const ma20   = calcMA(closes, 20);
  const ma60   = calcMA(closes, 60);
  const display = rows.slice(-60);
  const off     = rows.length - display.length;
  const tbody   = $('priceBody');
  tbody.innerHTML = '';
  display.forEach((r, i) => {
    const idx = off + i;
    const m20 = ma20[idx], m60 = ma60[idx];
    const c = r.change, cls = c > 0 ? 'up' : c < 0 ? 'down' : 'flat';
    const prev = idx > 0 ? rows[idx - 1].close : null;
    const p = prev ? (c / prev * 100) : null;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${isoDisp(r.date)}</td>
      <td class="${cls}">${fmt(r.open)}</td><td class="${cls}">${fmt(r.high)}</td>
      <td class="${cls}">${fmt(r.low)}</td> <td class="${cls}">${fmt(r.close)}</td>
      <td class="c-${cls}">${c >= 0 ? '+' : ''}${fmt(c)}</td>
      <td class="c-${cls}">${p != null ? (p >= 0 ? '+' : '') + fmt(p) + '%' : '—'}</td>
      <td>${fmt(r.vol, 0)}</td>
      <td class="c-ma">${m20 != null ? fmt(m20) : '—'}</td>
      <td class="c-ma60">${m60 != null ? fmt(m60) : '—'}</td>`;
    tbody.insertBefore(tr, tbody.firstChild);
  });
  return { ma20, ma60 };
}

/* ═══════════════════ Render Chart ═══════════════════ */
function renderPriceChart(rows, ma20, ma60) {
  if (priceChartInst) { priceChartInst.destroy(); priceChartInst = null; }
  const disp = rows.slice(-60), off = rows.length - disp.length;
  priceChartInst = new Chart($('priceChart'), {
    type: 'line',
    data: {
      labels: disp.map(r => isoDisp(r.date)),
      datasets: [
        { label: '收盤價', data: disp.map(r => r.close), borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,.07)', borderWidth: 2, pointRadius: 0, tension: .3, fill: true, order: 3 },
        { label: 'MA20',  data: ma20.slice(off).map(v => v ?? null), borderColor: '#c9a227', borderWidth: 1.8, pointRadius: 0, tension: .3, spanGaps: true, order: 2 },
        { label: 'MA60',  data: ma60.slice(off).map(v => v ?? null), borderColor: '#8957e5', borderWidth: 1.8, pointRadius: 0, tension: .3, spanGaps: true, order: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8b949e', font: { size: 12 } } },
        tooltip: { backgroundColor: '#1c2330', borderColor: '#30363d', borderWidth: 1, titleColor: '#e6edf3', bodyColor: '#8b949e', padding: 10,
          callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y != null ? fmt(ctx.parsed.y) : '—'}` } }
      },
      scales: {
        x: { ticks: { color: '#6e7681', maxTicksLimit: 10, maxRotation: 0 }, grid: { color: 'rgba(48,54,61,.5)' } },
        y: { ticks: { color: '#6e7681' }, grid: { color: 'rgba(48,54,61,.5)' }, position: 'right' }
      }
    }
  });
}

/* ═══════════════════ Fund Helpers ═══════════════════ */
const frow = (lbl, val, cls = '') => `
  <div class="frow"><span class="flbl">${lbl}</span><span class="fval ${cls}">${val}</span></div>`;

function ratioClass(v, high, mid) {
  if (v == null) return '';
  return v >= high ? 'up' : v >= mid ? '' : 'down';
}

/* ═══════════════════ Render Fundamentals ═══════════════════ */
function renderFundamentals(fmData, code) {
  const { info, income, balance, cashflow, dividend, monthly } = fmData;

  const noData = !income.length && !balance.length && !monthly.length;
  const noDataMsg = `<p style="color:var(--text-2);padding:8px 0">FinMind 目前無此股票的財務資料。</p>`;

  const fmInfo   = info.find(i => i.stock_id === code) || {};
  const industry = fmInfo.industry_category || '—';
  const mktType  = fmInfo.type === 'twse' ? '上市 (TWSE)' : fmInfo.type === 'tpex' ? '上櫃 (TPEx)' : '—';

  const incP  = byPeriod(income);   // newest first
  const balP  = byPeriod(balance);
  const cfP   = byPeriod(cashflow);

  const getQ = (arr, n) => arr.slice(0, n);

  // Latest quarter helpers
  const li = getQ(incP, 1)[0]?.[1] || {};
  const lb = getQ(balP, 1)[0]?.[1] || {};
  const lc = getQ(cfP,  1)[0]?.[1] || {};

  const rev   = li['營業收入'];
  const gross = li['營業毛利（毛損）淨額'];
  const opInc = li['營業利益（損失）'];
  const netInc= li['本期淨利（淨損）'] ?? li['歸屬於母公司業主之淨利（淨損）'];
  const eps   = li['基本每股盈餘（元）'];

  const tAssets= lb['資產總計'];
  const tLiab  = lb['負債總計'];
  const equity = lb['股東權益總計'] ?? lb['權益總計'];
  const cA     = lb['流動資產'];
  const cL     = lb['流動負債'];

  const opCF  = lc['營業活動之淨現金流入（流出）'];

  // Ratios
  const gm  = gross && rev ? gross / rev : null;
  const opm = opInc && rev ? opInc / rev : null;
  const npm = netInc && rev ? netInc / rev : null;
  const roe = netInc && equity ? netInc / equity : null;
  const roa = netInc && tAssets? netInc / tAssets: null;
  const dr  = tLiab && tAssets ? tLiab  / tAssets: null;
  const cr  = cA    && cL      ? cA     / cL      : null;

  /* ── Tab: 總覽 ── */
  $('tp-overview').innerHTML = noData ? noDataMsg : `
    <div class="card-grid">
      <div class="fcard">
        <div class="fcard-head">🏢 公司基本資訊</div>
        <div class="fcard-body">
          ${frow('股票代碼', code)}
          ${frow('公司名稱', fmInfo.stock_name || '—')}
          ${frow('產業類別', industry)}
          ${frow('掛牌市場', mktType)}
        </div>
      </div>
      <div class="fcard">
        <div class="fcard-head">💰 最新季度損益 ${incP[0]?.[0] ? '(' + dateToQ(incP[0][0]) + ')' : ''}</div>
        <div class="fcard-body">
          ${frow('營業收入', rev   != null ? fmtB(rev)   : '—')}
          ${frow('毛利', gross != null ? fmtB(gross) : '—')}
          ${frow('營業利益', opInc != null ? fmtB(opInc) : '—')}
          ${frow('稅後淨利', netInc!= null ? fmtB(netInc): '—')}
          ${frow('每股盈餘 EPS', eps != null ? fmt(eps) + ' 元' : '—')}
        </div>
      </div>
      <div class="fcard">
        <div class="fcard-head">📊 獲利能力指標</div>
        <div class="fcard-body">
          ${frow('毛利率',    gm  != null ? fmtP(gm)  : '—', ratioClass(gm,  .3, .1))}
          ${frow('營業利益率', opm != null ? fmtP(opm) : '—', ratioClass(opm, .15, .05))}
          ${frow('淨利率',    npm != null ? fmtP(npm) : '—', ratioClass(npm, .1, .03))}
          ${frow('ROE 股東報酬率', roe != null ? fmtP(roe) : '—', ratioClass(roe, .15, .05))}
          ${frow('ROA 資產報酬率', roa != null ? fmtP(roa) : '—', ratioClass(roa, .08, .02))}
        </div>
      </div>
      <div class="fcard">
        <div class="fcard-head">🏦 財務結構 ${balP[0]?.[0] ? '(' + dateToQ(balP[0][0]) + ')' : ''}</div>
        <div class="fcard-body">
          ${frow('總資產',   tAssets!= null ? fmtB(tAssets): '—')}
          ${frow('總負債',   tLiab  != null ? fmtB(tLiab)  : '—')}
          ${frow('股東權益', equity != null ? fmtB(equity) : '—')}
          ${frow('負債比率', dr != null ? fmtP(dr) : '—', dr != null ? (dr > .7 ? 'down' : dr < .4 ? 'up' : '') : '')}
          ${frow('流動比率', cr != null ? fmt(cr, 2) + 'x' : '—', cr != null ? (cr > 2 ? 'up' : cr > 1 ? '' : 'down') : '')}
          ${frow('營業現金流', opCF != null ? fmtB(opCF) : '—', opCF != null ? (opCF > 0 ? 'up' : 'down') : '')}
        </div>
      </div>
    </div>`;

  /* ── Tab: 損益表 ── */
  renderQTable('tp-income',
    ['營業收入', '營業毛利（毛損）淨額', '營業利益（損失）', '稅前淨利（淨損）', '本期淨利（淨損）', '基本每股盈餘（元）'],
    ['營業收入', '毛利', '營業利益', '稅前淨利', '稅後淨利', 'EPS（元）'],
    getQ(incP, 6), { '基本每股盈餘（元）': 'N' });

  /* ── Tab: 資產負債表 ── */
  renderQTable('tp-balance',
    ['資產總計', '流動資產', '非流動資產', '負債總計', '流動負債', '非流動負債', '股東權益總計'],
    ['總資產', '流動資產', '非流動資產', '總負債', '流動負債', '非流動負債', '股東權益'],
    getQ(balP, 6), {});

  /* ── Tab: 月營收 & 配息 ── */
  renderRevenueDividend('tp-revenue', monthly, dividend, cfP);

  /* ── Status ── */
  const $s = $('fmStatus');
  if (noData) {
    $s.className = 'status-note err';
    $s.textContent = '🔴 FinMind 無此股票財務資料（請確認代碼是否為上市/上櫃股票）';
  } else {
    $s.className = 'status-note ok';
    $s.textContent = `🟢 財務資料已從 FinMind 載入  （損益: ${incP.length} 季  資產: ${balP.length} 季  月營收: ${monthly.length} 筆）`;
  }
}

/* ─── Quarterly Table ─── */
function renderQTable(tabId, keys, labels, periods, numFmt) {
  if (!periods.length) { $(tabId).innerHTML = '<p style="color:var(--text-2);padding:8px 0">無資料</p>'; return; }
  const hds = periods.map(([d]) => dateToQ(d));
  let html = '<div class="tbl-scroll"><table><thead><tr><th>項目</th>';
  hds.forEach(h => { html += `<th>${h}</th>`; });
  html += '</tr></thead><tbody>';
  keys.forEach((key, ki) => {
    html += `<tr><td>${labels[ki]}</td>`;
    periods.forEach(([, data]) => {
      const v = data[key];
      const isN = numFmt[key] === 'N';
      html += `<td>${v != null ? (isN ? fmt(v) : fmtB(v)) : '—'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  $(tabId).innerHTML = html;
}

/* ─── Monthly Revenue + Dividend ─── */
function renderRevenueDividend(tabId, monthly, dividend, cfP) {
  let html = '';

  if (!monthly.length) {
    html += '<p style="color:var(--text-2);margin-bottom:16px">無月營收資料</p>';
  } else {
    const sorted = [...monthly].sort((a, b) => a.date.localeCompare(b.date)).slice(-14);
    // Bar chart
    html += '<div class="chart-sm"><canvas id="revChart"></canvas></div>';
    // Table (newest first)
    html += '<div class="tbl-scroll" style="margin-top:14px"><table><thead><tr><th>年月</th><th>月營收</th><th>月增率 MoM</th><th>年增率 YoY</th></tr></thead><tbody>';
    const rev12 = sorted.slice(-12);
    rev12.slice().reverse().forEach((row, ri) => {
      const idx12 = rev12.length - 1 - ri;
      const prevM = rev12[idx12 - 1];
      const prevY = sorted[idx12 - 2]; // approx 12 months ago (limited data)
      const mom   = prevM ? (row.revenue - prevM.revenue) / prevM.revenue : null;
      const yoy   = prevY ? (row.revenue - prevY.revenue) / prevY.revenue : null;
      html += `<tr>
        <td>${row.date.slice(0, 7)}</td>
        <td>${fmtB(row.revenue)}</td>
        <td class="${mom != null ? (mom > 0 ? 'c-up' : 'c-down') : ''}">${mom != null ? (mom > 0 ? '+' : '') + fmtP(mom) : '—'}</td>
        <td class="${yoy != null ? (yoy > 0 ? 'c-up' : 'c-down') : ''}">${yoy != null ? (yoy > 0 ? '+' : '') + fmtP(yoy) : '—'}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    html += `<p class="source" style="margin-top:8px">月營收資料來源：FinMind TaiwanStockMonthRevenue</p>`;
  }

  // Cash Flow table
  if (cfP.length) {
    const last4cf = cfP.slice(0, 4);
    html += '<div style="margin-top:20px">';
    html += '<div class="fcard"><div class="fcard-head">💸 現金流量（近4季）</div><div class="fcard-body">';
    html += '<div class="tbl-scroll"><table><thead><tr><th>季別</th>';
    last4cf.forEach(([d]) => { html += `<th>${dateToQ(d)}</th>`; });
    html += '</tr></thead><tbody>';
    const cfKeys = [
      ['營業活動之淨現金流入（流出）', '營業CF'],
      ['投資活動之淨現金流入（流出）', '投資CF'],
      ['籌資活動之淨現金流入（流出）', '籌資CF'],
    ];
    cfKeys.forEach(([key, lbl]) => {
      html += `<tr><td>${lbl}</td>`;
      last4cf.forEach(([, data]) => {
        const v = data[key];
        const cls = v != null ? (v > 0 ? 'c-up' : 'c-down') : '';
        html += `<td class="${cls}">${v != null ? fmtB(v) : '—'}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div></div></div>';
  }

  // Dividend table
  if (dividend.length) {
    const recentDiv = [...dividend].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
    html += '<div style="margin-top:20px"><div class="fcard"><div class="fcard-head">💵 近期配息記錄</div><div class="fcard-body">';
    html += '<div class="tbl-scroll"><table><thead><tr><th>年度</th><th>現金股利 (元)</th><th>股票股利 (元)</th><th>合計 (元)</th></tr></thead><tbody>';
    recentDiv.forEach(d => {
      const cash  = d.cash_dividend  != null ? parseFloat(d.cash_dividend)  : null;
      const stock = d.stock_dividend != null ? parseFloat(d.stock_dividend) : null;
      const total = cash != null && stock != null ? cash + stock : null;
      html += `<tr>
        <td>${d.date?.slice(0, 4) || '—'}</td>
        <td class="${cash > 0 ? 'c-up' : ''}">${cash != null ? fmt(cash) : '—'}</td>
        <td>${stock != null ? fmt(stock) : '—'}</td>
        <td>${total != null ? fmt(total) : '—'}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div></div>';
  }

  $(tabId).innerHTML = html;

  // Draw revenue bar chart
  if (monthly.length) {
    const sorted = [...monthly].sort((a, b) => a.date.localeCompare(b.date)).slice(-12);
    setTimeout(() => {
      const ctx = document.getElementById('revChart');
      if (!ctx) return;
      if (revChartInst) { revChartInst.destroy(); revChartInst = null; }
      revChartInst = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sorted.map(r => r.date.slice(0, 7)),
          datasets: [{ label: '月營收', data: sorted.map(r => r.revenue), backgroundColor: 'rgba(88,166,255,.65)', borderColor: '#58a6ff', borderWidth: 1 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#8b949e', font: { size: 12 } } },
            tooltip: { backgroundColor: '#1c2330', borderColor: '#30363d', borderWidth: 1, titleColor: '#e6edf3', bodyColor: '#8b949e',
              callbacks: { label: ctx => `月營收: ${fmtB(ctx.parsed.y)}` } } },
          scales: {
            x: { ticks: { color: '#6e7681', maxRotation: 45 }, grid: { color: 'rgba(48,54,61,.5)' } },
            y: { ticks: { color: '#6e7681', callback: v => fmtB(v) }, grid: { color: 'rgba(48,54,61,.5)' }, position: 'right' }
          }
        }
      });
    }, 100);
  }
}

/* ═══════════════════ Main Search ═══════════════════ */
async function doSearch() {
  const code = $('codeInput').value.trim().replace(/\s/g, '');
  if (!code) { alert('請輸入股票代碼'); return; }

  $('searchBtn').disabled = true;
  showLoading();

  try {
    /* 1. Price data */
    setStep('TWSE / TPEx 股價資料載入中…');
    const { rows, stockName, isTWO } = await fetchAllPrices(code);

    if (!rows || !rows.length) {
      showError(`找不到股票代碼「${code}」的資料，請確認代碼是否正確（上市/上櫃格式：4~6碼數字）。`);
      $('searchBtn').disabled = false;
      return;
    }

    /* 2. Render price table + chart */
    setStep('計算 MA20 / MA60…');
    const { ma20, ma60 } = renderPriceTable(rows);
    renderPriceChart(rows, ma20, ma60);

    /* 3. FinMind financial data */
    const fmData = await fetchFinMind(code);

    /* 4. Render */
    setStep('渲染頁面…');
    renderInfoBar(code, stockName, rows, fmData);
    renderFundamentals(fmData, code);

    showMain();
  } catch (err) {
    showError('資料載入發生錯誤：' + err.message);
    console.error(err);
  }

  $('searchBtn').disabled = false;
}

$('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
